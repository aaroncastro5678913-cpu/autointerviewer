# Netlify config for the unified Auto-Interview project.
# Frontend (Vite) is served statically; the API + Telegram webhook run as a
# single Netlify Function (netlify/functions/api.js) backed by libSQL/Turso.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  # The native local-file client isn't used in production (Turso is remote);
  # keep it external so esbuild doesn't try to bundle native binaries.
  external_node_modules = ["@libsql/client"]

# API + Telegram webhook -> the function. Must be ABOVE the SPA catch-all.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Single-page app: deep links like /interview/<token> serve index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
